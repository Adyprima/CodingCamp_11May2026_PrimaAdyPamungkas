<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Info banner for storage load messages (hidden by default) -->
  <div id="info-banner" hidden role="status" aria-live="polite"></div>

  <!-- Balance Display -->
  <section id="balance-section">
    <h1>Total Balance</h1>
    <p id="balance-amount">$0.00</p>
  </section>

  <!-- Input Form -->
  <form id="input-form" novalidate>
    <h2>Add Transaction</h2>
    <div class="form-group">
      <label for="item-name">Item Name</label>
      <input
        type="text"
        id="item-name"
        name="item-name"
        maxlength="100"
        placeholder="e.g. Lunch"
        autocomplete="off"
      />
    </div>
    <div class="form-group">
      <label for="item-amount">Amount ($)</label>
      <input
        type="number"
        id="item-amount"
        name="item-amount"
        min="0.01"
        max="999999999.99"
        step="0.01"
        placeholder="e.g. 12.50"
      />
    </div>
    <div class="form-group">
      <label for="item-category">Category</label>
      <select id="item-category" name="item-category">
        <option value="">-- Select Category --</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Fun">Fun</option>
      </select>
    </div>
    <button type="submit">Add Transaction</button>
    <div id="form-error" role="alert" aria-live="polite"></div>
  </form>

  <!-- Transaction List -->
  <section id="transaction-list-section">
    <h2>Transactions</h2>
    <ul id="transaction-list"></ul>
    <p id="empty-state-msg" hidden>No transactions have been recorded yet.</p>
  </section>

  <!-- Pie Chart -->
  <section id="pie-chart-section">
    <h2>Spending by Category</h2>
    <svg
      id="pie-chart"
      viewBox="0 0 200 200"
      role="img"
      aria-label="Spending pie chart"
    ></svg>
    <ul id="pie-legend"></ul>
    <p id="pie-empty-msg" hidden>No spending data to display.</p>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
